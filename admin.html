<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Staff portal login for the Asene Manso Akroso District Assembly management information system.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
    (function() {
        var firebaseConfig = {
            apiKey:            "AIzaSyCNt_ha80WaLVujbc2ryDSFMAOBdzLVXtA",
            authDomain:        "asmda-website.firebaseapp.com",
            databaseURL:       "https://asmda-website-default-rtdb.firebaseio.com",
            projectId:         "asmda-website",
            storageBucket:     "asmda-website.firebasestorage.app",
            messagingSenderId: "699818483381",
            appId:             "1:699818483381:web:09c926a48830d46ae228fc"
        };
        window._fbApp  = firebase.apps.length ? firebase.apps[0] : firebase.initializeApp(firebaseConfig);
        window._fbAuth = firebase.auth();
        window._fbDb   = firebase.database();
    })();
    </script>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            background:#0a1f10;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(31,107,58,0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(201,162,39,0.1) 0%, transparent 50%),
                repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px),
                repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px);
            overflow:hidden;
        }
        .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.18;animation:blobFloat 8s ease-in-out infinite;}
        .blob1{width:400px;height:400px;background:#1F6B3A;top:-100px;left:-80px;animation-delay:0s;}
        .blob2{width:300px;height:300px;background:#C9A227;bottom:-80px;right:-60px;animation-delay:-3s;}
        .blob3{width:200px;height:200px;background:#1F6B3A;bottom:100px;left:30%;animation-delay:-5s;}
        @keyframes blobFloat{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(20px,-20px) scale(1.05);}}

        .login-wrap{position:relative;z-index:10;width:100%;max-width:440px;padding:20px;}

        .login-brand{text-align:center;margin-bottom:32px;}
        .login-logo{
            width:80px;height:80px;background:#fff;border-radius:16px;
            margin:0 auto 16px;overflow:hidden;padding:6px;
            box-shadow:0 8px 32px rgba(0,0,0,0.4);
            display:flex;align-items:center;justify-content:center;
        }
        .login-logo img{width:100%;height:100%;object-fit:contain;}
        .login-brand h1{color:#fff;font-size:1.35rem;font-weight:800;letter-spacing:-0.01em;margin-bottom:4px;}
        .login-brand p{color:rgba(255,255,255,0.5);font-size:0.8rem;letter-spacing:0.06em;text-transform:uppercase;}

        .login-card{
            background:rgba(255,255,255,0.04);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:20px;
            padding:36px 38px 32px;
            box-shadow:0 24px 60px rgba(0,0,0,0.5);
        }
        .login-card h2{color:#fff;font-size:1.1rem;font-weight:700;margin-bottom:6px;}
        .login-card .subtitle{color:rgba(255,255,255,0.45);font-size:0.82rem;margin-bottom:28px;display:flex;align-items:center;gap:8px;}
        .login-card .subtitle::before{content:'';width:24px;height:2px;background:#C9A227;display:inline-block;}

        /* Role pills */
        .account-pills{display:flex;gap:8px;margin-bottom:22px;}
        .acc-pill{
            flex:1;padding:9px 12px;background:rgba(255,255,255,0.05);
            border:1.5px solid rgba(255,255,255,0.1);border-radius:8px;
            text-align:center;cursor:pointer;transition:all 0.2s;
        }
        .acc-pill.active{background:rgba(31,107,58,0.2);border-color:rgba(31,107,58,0.5);}
        .acc-pill .pill-role{font-size:0.78rem;font-weight:700;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.06em;}
        .acc-pill.active .pill-role{color:#4ade80;}
        .acc-pill .pill-id{font-size:0.72rem;color:rgba(255,255,255,0.3);margin-top:2px;}
        .acc-pill.active .pill-id{color:rgba(255,255,255,0.5);}

        /* Error */
        .error-msg{
            background:rgba(220,53,69,0.15);border:1px solid rgba(220,53,69,0.4);
            color:#ff8a8a;border-radius:8px;padding:10px 14px;
            font-size:0.83rem;margin-bottom:16px;display:none;
            align-items:center;gap:8px;
        }
        .error-msg.show{display:flex;}

        /* Form */
        .form-group{margin-bottom:18px;}
        .form-group label{display:block;font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.5);margin-bottom:8px;}
        .input-wrap{position:relative;}
        .input-wrap i.field-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.3);font-size:0.9rem;}
        .login-input{
            width:100%;padding:13px 14px 13px 42px;
            background:rgba(255,255,255,0.07);
            border:1.5px solid rgba(255,255,255,0.1);
            border-radius:10px;color:#fff;font-size:0.93rem;
            font-family:inherit;transition:all 0.2s;
        }
        .login-input:focus{outline:none;border-color:#1F6B3A;background:rgba(31,107,58,0.1);box-shadow:0 0 0 3px rgba(31,107,58,0.2);}
        .login-input::placeholder{color:rgba(255,255,255,0.25);}
        .pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.3);cursor:pointer;font-size:0.88rem;transition:color 0.2s;}
        .pw-toggle:hover{color:rgba(255,255,255,0.7);}

        /* Sign In button */
        .login-btn{
            width:100%;padding:14px;margin-top:8px;
            background:linear-gradient(135deg,#1F6B3A,#155229);
            color:#fff;border:none;border-radius:10px;
            font-size:0.95rem;font-weight:700;cursor:pointer;
            transition:all 0.25s;letter-spacing:0.02em;
            display:flex;align-items:center;justify-content:center;gap:10px;
        }
        .login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(31,107,58,0.45);background:linear-gradient(135deg,#27874a,#1F6B3A);}
        .login-btn:active{transform:translateY(0);}
        .login-btn:disabled{opacity:0.7;cursor:not-allowed;transform:none;}

        /* Divider */
        .divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.1);}
        .divider span{color:rgba(255,255,255,0.3);font-size:0.78rem;white-space:nowrap;}

        /* Google button */
        .google-btn{
            width:100%;padding:13px 14px;
            background:rgba(255,255,255,0.06);
            border:1.5px solid rgba(255,255,255,0.15);
            border-radius:10px;color:#fff;font-size:0.93rem;font-weight:600;
            cursor:pointer;transition:all 0.25s;
            display:flex;align-items:center;justify-content:center;gap:12px;
            font-family:inherit;
        }
        .google-btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.3);transform:translateY(-2px);}
        .google-btn:active{transform:translateY(0);}
        .google-btn:disabled{opacity:0.7;cursor:not-allowed;transform:none;}
        .google-icon{width:20px;height:20px;flex-shrink:0;}

        .login-footer{text-align:center;margin-top:24px;}
        .login-footer a{color:rgba(255,255,255,0.35);font-size:0.78rem;text-decoration:none;transition:color 0.2s;}
        .login-footer a:hover{color:rgba(255,255,255,0.6);}

        .version-badge{
            position:fixed;bottom:16px;right:16px;
            background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.3);
            padding:5px 12px;border-radius:20px;font-size:0.72rem;
            border:1px solid rgba(255,255,255,0.08);
        }
    </style>
</head>
<body>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <div class="login-wrap">
        <div class="login-brand">
            <div class="login-logo">
                <img src="LOGO.jpg" alt="AMADA" onerror="this.parentElement.innerHTML='<i class=\'fas fa-landmark\' style=\'font-size:2rem;color:#1F6B3A;\'></i>'">
            </div>
            <h1>AMADA Admin Portal</h1>
            <p>Asene Manso Akroso District Assembly</p>
        </div>

        <div class="login-card">
            <h2>Welcome back</h2>
            <div class="subtitle">Sign in to your account</div>

            <!-- Role pills -->
            <div class="account-pills">
                <div class="acc-pill active" id="pill-super" onclick="fillAccount('super')">
                    <div class="pill-role">Super Admin</div>
                    <div class="pill-id">Full Access</div>
                </div>
                <div class="acc-pill" id="pill-pub" onclick="fillAccount('publisher')">
                    <div class="pill-role">Publisher</div>
                    <div class="pill-id">Content Only</div>
                </div>
            </div>

            <!-- Error message -->
            <div class="error-msg" id="errorMsg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid credentials.</span>
            </div>

            <!-- Email / Password form -->
            <form onsubmit="doEmailLogin(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope field-icon"></i>
                        <input type="email" class="login-input" id="emailInput"
                            placeholder="admin@asmda.gov.gh"
                            autocomplete="email" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock field-icon"></i>
                        <input type="password" class="login-input" id="passwordInput"
                            placeholder="Enter password"
                            autocomplete="current-password" required>
                        <span class="pw-toggle" onclick="togglePw()">
                            <i class="fas fa-eye" id="pwEye"></i>
                        </span>
                    </div>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="divider"><span>or continue with</span></div>

            <!-- Google Sign-in -->
            <button class="google-btn" id="googleBtn" onclick="doGoogleLogin()">
                <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </button>

            <div class="login-footer">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to public website</a>
            </div>
        </div>
    </div>

    <div class="version-badge">AMADA Admin v1.0 &nbsp;|&nbsp; MIS Unit</div>

    <script>
    /* ── Selected role ── */
    var _selectedRole = 'superadmin';

    function fillAccount(type) {
        _selectedRole = (type === 'super') ? 'superadmin' : 'publisher';
        document.getElementById('pill-super').classList.toggle('active', type === 'super');
        document.getElementById('pill-pub').classList.toggle('active',   type !== 'super');
        hideError();
    }

    function togglePw() {
        var inp = document.getElementById('passwordInput');
        var eye = document.getElementById('pwEye');
        inp.type = (inp.type === 'password') ? 'text' : 'password';
        eye.className = (inp.type === 'password') ? 'fas fa-eye' : 'fas fa-eye-slash';
    }

    function showError(msg) {
        var el = document.getElementById('errorMsg');
        document.getElementById('errorText').textContent = msg;
        el.classList.add('show');
    }

    function hideError() {
        document.getElementById('errorMsg').classList.remove('show');
    }

    /* ── Shared: verify role from /admins/{uid} then save session ── */
    function verifyRoleAndRedirect(user) {
        return window._fbDb.ref('admins/' + user.uid).get().then(function(snap) {
            if (!snap.exists()) {
                window._fbAuth.signOut();
                throw new Error('no-role');
            }
            var data = snap.val();
            if (data.role !== _selectedRole) {
                window._fbAuth.signOut();
                throw new Error('wrong-role');
            }
            /* Save session */
            sessionStorage.setItem('amada_admin_user', JSON.stringify({
                uid:       user.uid,
                email:     user.email,
                role:      data.role,
                name:      data.name || user.displayName || user.email,
                access:    data.role === 'superadmin' ? 'full' : 'content',
                loginTime: new Date().toISOString()
            }));
            window.location.href = 'admin_dashboard.html';
        });
    }

    /* ── Email / Password login ── */
    function doEmailLogin(e) {
        e.preventDefault();
        var email    = document.getElementById('emailInput').value.trim();
        var password = document.getElementById('passwordInput').value;
        var btn      = document.getElementById('loginBtn');

        hideError();
        btn.innerHTML  = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
        btn.disabled   = true;

        window._fbAuth.signInWithEmailAndPassword(email, password)
            .then(function(cred) { return verifyRoleAndRedirect(cred.user); })
            .catch(function(err) {
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                btn.disabled  = false;
                handleAuthError(err);
            });
    }

    /* ── Google Sign-in ── */
    function doGoogleLogin() {
        var btn = document.getElementById('googleBtn');
        hideError();
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Opening Google...';
        btn.disabled  = true;

        var provider = new firebase.auth.GoogleAuthProvider();
        window._fbAuth.signInWithPopup(provider)
            .then(function(cred) { return verifyRoleAndRedirect(cred.user); })
            .catch(function(err) {
                btn.innerHTML = '<svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Sign in with Google';
                btn.disabled = false;
                if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
                    handleAuthError(err);
                }
            });
    }

    /* ── Shared error handler ── */
    function handleAuthError(err) {
        if (err.message === 'no-role') {
            showError('Your account has no admin role assigned. Contact the system administrator.');
        } else if (err.message === 'wrong-role') {
            showError('This account does not have the selected role. Please choose the correct role above.');
        } else if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
            showError('Invalid email or password. Please try again.');
        } else if (err.code === 'auth/too-many-requests') {
            showError('Too many failed attempts. Account temporarily locked. Try again later.');
        } else if (err.code === 'auth/popup-blocked') {
            showError('Popup was blocked by your browser. Please allow popups for this site and try again.');
        } else {
            showError('Sign-in failed: ' + (err.message || 'Unknown error'));
        }
    }

    /* ── If already authenticated, go straight to dashboard ── */
    window._fbAuth.onAuthStateChanged(function(user) {
        if (user && sessionStorage.getItem('amada_admin_user')) {
            window.location.href = 'admin_dashboard.html';
        }
    });
    </script>
</body>
</html>

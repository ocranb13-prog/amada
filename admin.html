<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="description" content="Staff portal login for the Asene Manso Akroso District Assembly management information system.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            min-height:100vh; display:flex; align-items:center; justify-content:center;
            background: #0a1f10;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(31,107,58,0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(201,162,39,0.1) 0%, transparent 50%),
                repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px),
                repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px);
            overflow:hidden;
        }
        /* floating blobs */
        .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.18;animation:blobFloat 8s ease-in-out infinite;}
        .blob1{width:400px;height:400px;background:#1F6B3A;top:-100px;left:-80px;animation-delay:0s;}
        .blob2{width:300px;height:300px;background:#C9A227;bottom:-80px;right:-60px;animation-delay:-3s;}
        .blob3{width:200px;height:200px;background:#1F6B3A;bottom:100px;left:30%;animation-delay:-5s;}
        @keyframes blobFloat{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(20px,-20px) scale(1.05);}}

        .login-wrap{
            position:relative;z-index:10;
            width:100%;max-width:440px;padding:20px;
        }
        /* Logo area */
        .login-brand{text-align:center;margin-bottom:32px;}
        .login-logo{
            width:80px;height:80px;background:#fff;border-radius:16px;
            margin:0 auto 16px;overflow:hidden;padding:6px;
            box-shadow:0 8px 32px rgba(0,0,0,0.4);
            display:flex;align-items:center;justify-content:center;
        }
        .login-logo img{width:100%;height:100%;object-fit:contain;}
        .login-brand h1{color:#fff;font-size:1.35rem;font-weight:800;letter-spacing:-0.01em;margin-bottom:4px;}
        .login-brand p{color:rgba(255,255,255,0.5);font-size:0.8rem;letter-spacing:0.06em;text-transform:uppercase;}

        /* Card */
        .login-card{
            background:rgba(255,255,255,0.04);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:20px;
            padding:36px 38px 32px;
            box-shadow:0 24px 60px rgba(0,0,0,0.5);
        }
        .login-card h2{color:#fff;font-size:1.1rem;font-weight:700;margin-bottom:6px;}
        .login-card .subtitle{color:rgba(255,255,255,0.45);font-size:0.82rem;margin-bottom:28px;display:flex;align-items:center;gap:8px;}
        .login-card .subtitle::before{content:'';width:24px;height:2px;background:var(--accent,#C9A227);display:inline-block;}

        .form-group{margin-bottom:18px;}
        .form-group label{display:block;font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.5);margin-bottom:8px;}
        .input-wrap{position:relative;}
        .input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.3);font-size:0.9rem;}
        .login-input{
            width:100%;padding:13px 14px 13px 42px;
            background:rgba(255,255,255,0.07);
            border:1.5px solid rgba(255,255,255,0.1);
            border-radius:10px;color:#fff;font-size:0.93rem;
            font-family:inherit;transition:all 0.2s;
        }
        .login-input:focus{outline:none;border-color:#1F6B3A;background:rgba(31,107,58,0.1);box-shadow:0 0 0 3px rgba(31,107,58,0.2);}
        .login-input::placeholder{color:rgba(255,255,255,0.25);}
        .pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.3);cursor:pointer;font-size:0.88rem;transition:color 0.2s;}
        .pw-toggle:hover{color:rgba(255,255,255,0.7);}

        .login-btn{
            width:100%;padding:14px;margin-top:8px;
            background:linear-gradient(135deg,#1F6B3A,#155229);
            color:#fff;border:none;border-radius:10px;
            font-size:0.95rem;font-weight:700;cursor:pointer;
            transition:all 0.25s;letter-spacing:0.02em;
            display:flex;align-items:center;justify-content:center;gap:10px;
        }
        .login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(31,107,58,0.45);background:linear-gradient(135deg,#27874a,#1F6B3A);}
        .login-btn:active{transform:translateY(0);}

        .error-msg{
            background:rgba(220,53,69,0.15);border:1px solid rgba(220,53,69,0.4);
            color:#ff8a8a;border-radius:8px;padding:10px 14px;
            font-size:0.83rem;margin-bottom:16px;display:none;
            align-items:center;gap:8px;
        }
        .error-msg.show{display:flex;}

        .login-footer{text-align:center;margin-top:24px;}
        .login-footer a{color:rgba(255,255,255,0.35);font-size:0.78rem;text-decoration:none;transition:color 0.2s;}
        .login-footer a:hover{color:rgba(255,255,255,0.6);}

        /* Account type pills */
        .account-pills{display:flex;gap:8px;margin-bottom:22px;}
        .acc-pill{
            flex:1;padding:9px 12px;background:rgba(255,255,255,0.05);
            border:1.5px solid rgba(255,255,255,0.1);border-radius:8px;
            text-align:center;cursor:pointer;transition:all 0.2s;
        }
        .acc-pill.active{background:rgba(31,107,58,0.2);border-color:rgba(31,107,58,0.5);}
        .acc-pill .pill-role{font-size:0.78rem;font-weight:700;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.06em;}
        .acc-pill.active .pill-role{color:#4ade80;}
        .acc-pill .pill-id{font-size:0.72rem;color:rgba(255,255,255,0.3);margin-top:2px;}
        .acc-pill.active .pill-id{color:rgba(255,255,255,0.5);}

        .version-badge{
            position:fixed;bottom:16px;right:16px;
            background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.3);
            padding:5px 12px;border-radius:20px;font-size:0.72rem;
            border:1px solid rgba(255,255,255,0.08);
        }
    </style>
</head>
<body>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <div class="login-wrap">
        <div class="login-brand">
            <div class="login-logo">
                <img src="LOGO.jpg" alt="AMADA" onerror="this.parentElement.innerHTML='<i class=\'fas fa-landmark\' style=\'font-size:2rem;color:#1F6B3A;\'></i>'">
            </div>
            <h1>AMADA Admin Portal</h1>
            <p>Asene Manso Akroso District Assembly</p>
        </div>

        <div class="login-card">
            <h2>Welcome back</h2>
            <div class="subtitle">Sign in to your account</div>

            <!-- Quick-fill pills -->
            <div class="account-pills">
                <div class="acc-pill" id="pill-super" onclick="fillAccount('super')">
                    <div class="pill-role">Super Admin</div>
                    <div class="pill-id">Full Access</div>
                </div>
                <div class="acc-pill" id="pill-pub" onclick="fillAccount('publisher')">
                    <div class="pill-role">Publisher</div>
                    <div class="pill-id">Content Only</div>
                </div>
            </div>

            <div class="error-msg" id="errorMsg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid username or password.</span>
            </div>

            <form onsubmit="doLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrap">
                        <i class="fas fa-user"></i>
                        <input type="text" class="login-input" id="username" placeholder="Enter username" autocomplete="username"  required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="login-input" id="password" placeholder="Enter password" autocomplete="current-password"  required>
                        <span class="pw-toggle" onclick="togglePw()"><i class="fas fa-eye" id="pwEye"></i></span>
                    </div>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="login-footer">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to public website</a>
            </div>
        </div>
    </div>

    <div class="version-badge">AMADA Admin v1.0 &nbsp;|&nbsp; MIS Unit</div>

    <script>
    var USERS = {
        'AMADA1': { password:'3767AMADA', role:'superadmin', name:'Super Admin', access:'full' },
        'AMADA2': { password:'3767AMADA', role:'publisher',  name:'Publisher',   access:'content' }
    };

    function fillAccount(type) {
        if (type==='super') {
            document.getElementById('username').value = 'AMADA1';
            document.getElementById('pill-super').classList.add('active');
            document.getElementById('pill-pub').classList.remove('active');
        } else {
            document.getElementById('username').value = 'AMADA2';
            document.getElementById('pill-super').classList.remove('active');
            document.getElementById('pill-pub').classList.add('active');
        }
        /* password not auto-filled for security */
    }

    function togglePw() {
        var inp = document.getElementById('password');
        var eye = document.getElementById('pwEye');
        if (inp.type==='password') { inp.type='text'; eye.className='fas fa-eye-slash'; }
        else { inp.type='password'; eye.className='fas fa-eye'; }
    }

    function doLogin(e) {
        e.preventDefault();
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;
        var errEl    = document.getElementById('errorMsg');
        var btn      = document.getElementById('loginBtn');

        errEl.classList.remove('show');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
        btn.disabled = true;

        setTimeout(function() {
            var user = USERS[username];
            if (!user || user.password !== password) {
                errEl.classList.add('show');
                document.getElementById('errorText').textContent = 'Invalid username or password. Please try again.';
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                btn.disabled = false;
                return;
            }
            /* Save session */
            sessionStorage.setItem('amada_admin_user', JSON.stringify({ username, role:user.role, name:user.name, access:user.access, loginTime: new Date().toISOString() }));
            btn.innerHTML = '<i class="fas fa-check"></i> Redirecting...';
            window.location.href = 'admin_dashboard.html';
        }, 800);
    }

    /* Highlight pill based on typed username */
    document.getElementById('username').addEventListener('input', function() {
        var v = this.value.toUpperCase();
        if (v==='AMADA1')      { document.getElementById('pill-super').classList.add('active'); document.getElementById('pill-pub').classList.remove('active'); }
        else if (v==='AMADA2') { document.getElementById('pill-pub').classList.add('active'); document.getElementById('pill-super').classList.remove('active'); }
        else                    { document.getElementById('pill-super').classList.remove('active'); document.getElementById('pill-pub').classList.remove('active'); }
    });

    /* Check if already logged in */
    if (sessionStorage.getItem('amada_admin_user')) window.location.href = 'admin_dashboard.html';
    </script>
</body>
</html>
